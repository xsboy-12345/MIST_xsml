# Llama-3.1-8B-Instruct LoRA judge fine-tuning config

model_name: "meta-llama/Llama-3.1-8B-Instruct"
output_dir: "outputs/llama"

# LoRA
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training
num_epochs: 8
per_device_train_batch_size: 1
per_device_eval_batch_size: 2
gradient_accumulation_steps: 16
learning_rate: 0.0001
lr_scheduler: "cosine"
warmup_steps: 100
weight_decay: 0.01
max_seq_length: 512
gradient_checkpointing: true

# Quantization (QLoRA)
use_4bit: true
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_quant_type: "nf4"

# Evaluation
eval_strategy: "epoch"
save_strategy: "epoch"
load_best_model_at_end: true
metric_for_best_model: "tau_average"

# Logging
logging_steps: 20
report_to: "none"          # 换成 "wandb" 可接 wandb
seed: 42
