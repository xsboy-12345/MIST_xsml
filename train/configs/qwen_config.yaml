# Qwen2.5-7B-Instruct LoRA judge fine-tuning config

model_name: "Qwen/Qwen2.5-7B-Instruct"
output_dir: "outputs/qwen"

# LoRA
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj

# Training
num_epochs: 5
per_device_train_batch_size: 4
per_device_eval_batch_size: 8
gradient_accumulation_steps: 4
learning_rate: 2e-4
lr_scheduler: "cosine"
warmup_ratio: 0.05
weight_decay: 0.01
max_seq_length: 1024

# Quantization (QLoRA)
use_4bit: true
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_quant_type: "nf4"

# Evaluation
eval_strategy: "epoch"
save_strategy: "epoch"
load_best_model_at_end: true
metric_for_best_model: "tau_average"

# Logging
logging_steps: 20
report_to: "none"
seed: 42
